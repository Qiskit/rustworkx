# Dependabot version updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Cooldown waits 7 days after a release before opening an update PR, giving the
# community time to surface regressions. Minor/patch updates are grouped to
# reduce churn; major updates are opened individually so each is reviewed on
# its own merit.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
